name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_HOME: /home/runner/.cyrius

jobs:
  build-and-test:
    name: Build + Test + Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="$(cat .cyrius-toolchain | tr -d '[:space:]')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Lint
        run: |
          cyrius lint src/nous.cyr
          cyrius lint tests/nous.tcyr
          cyrius lint tests/nous.bcyr
          cyrius lint tests/nous.fcyr

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/nous

      - name: Smoke check
        run: ./build/nous

      - name: Test suite (271 assertions)
        run: cyrius test tests/nous.tcyr

      - name: Fuzz harness
        run: cyrius test tests/nous.fcyr

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="$(cat .cyrius-toolchain | tr -d '[:space:]')"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Run benchmarks
        run: |
          mkdir -p build
          cyrius bench tests/nous.bcyr 2>&1 | tee bench-output.txt

      - name: Check for regressions
        run: |
          # Parse benchmark output and check against thresholds
          # Fail if any microbenchmark exceeds 1ms avg or recipe_db_load exceeds 30ms
          awk '
            /avg/ {
              name = $1;
              gsub(/:/, "", name);
              # Extract avg value
              for (i=1; i<=NF; i++) {
                if ($i == "avg") {
                  val = $(i-1);
                  gsub(/[^0-9.]/, "", val);
                  unit = $(i-1);
                  # Convert to microseconds
                  if (unit ~ /ms/) { val = val * 1000; }
                  if (unit ~ /us/) { val = val * 1; }
                  if (unit ~ /ns/) { val = val / 1000; }
                  # Threshold: 1000us for micro, 30000us for recipe_db_load
                  threshold = 1000;
                  if (name == "recipe_db_load") threshold = 30000;
                  if (val > threshold) {
                    printf "REGRESSION: %s = %.0fus (threshold: %dus)\n", name, val, threshold;
                    exit 1;
                  }
                }
              }
            }
          ' bench-output.txt
          echo "All benchmarks within thresholds"

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-output.txt

  integration:
    name: Integration (apt)
    runs-on: ubuntu-latest
    needs: [build-and-test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="$(cat .cyrius-toolchain | tr -d '[:space:]')"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Verify apt tools available
        run: |
          which apt-cache && which dpkg-query && echo "apt tools available"

      - name: Build
        run: |
          mkdir -p build
          cyrius build src/main.cyr build/nous

      - name: Run test suite (includes integration_apt)
        run: cyrius test tests/nous.tcyr

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required docs
        run: |
          for doc in README.md CHANGELOG.md VERSION LICENSE cyrius.cyml \
                     docs/api.md docs/architecture/overview.md \
                     docs/development/roadmap.md docs/audit/2026-04-16.md; do
            test -f "$doc" && echo "OK: $doc" || { echo "MISSING: $doc"; exit 1; }
          done
      - name: Verify VERSION matches
        run: |
          echo "VERSION: $(cat VERSION)"
