name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml

  release:
    name: Build & Release
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TAG_VERSION="${GITHUB_REF_NAME}"
          test "$FILE_VERSION" = "$TAG_VERSION" || {
            echo "VERSION ($FILE_VERSION) != tag ($TAG_VERSION)"
            exit 1
          }

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="$(cat .cyrius-toolchain | tr -d '[:space:]')"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH

      - name: Build release binary
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/nous
          strip build/nous 2>/dev/null || true

      - name: Package
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          tar czf "nous-${VERSION}-x86_64-linux.tar.gz" -C build nous
          sha256sum "nous-${VERSION}-x86_64-linux.tar.gz" > "nous-${VERSION}-x86_64-linux.tar.gz.sha256"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            nous-*-x86_64-linux.tar.gz
            nous-*-x86_64-linux.tar.gz.sha256
